version: '3.8'

services:
  mongo:
    image: mongo:6
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  auth-service:
    build: ./auth-service
    container_name: auth-service
    environment:
      - MONGO_URI=mongodb://mongo:27017/authdb
      - JWT_SECRET=mon_secret_super_securise_123
      - PORT=3001
    depends_on:
      - mongo
    restart: unless-stopped

  student-service:
    build: ./student-service
    container_name: student-service
    environment:
      - MONGO_URI=mongodb://mongo:27017/studentdb
      - PORT=3002
    depends_on:
      - mongo
    restart: unless-stopped

  grade-service:
    build: ./grade-service
    container_name: grade-service
    environment:
      - MONGO_URI=mongodb://mongo:27017/gradedb
      - PORT=3003
    depends_on:
      - mongo
    restart: unless-stopped

  gateway:
    build: ./gateway
    container_name: gateway
    ports:
      - "3000:3000"
    depends_on:
      - auth-service
      - student-service
      - grade-service
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - gateway
    restart: unless-stopped

volumes:
  mongo-data:
